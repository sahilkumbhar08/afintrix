# Local Afintrix stack (does not replace docker-compose.yml / docker-compose.dev.yml).
# Usage from repo root: docker compose -f docker-compose.local.yml up --build
#
# Before first run (once on the host):
#   cd api && composer install
# Fedora/RHEL (SELinux): bind mounts use :z so the container can read ./api and ./client.

name: afintrix-local

networks:
  afintrix-network:
    name: afintrix-network

volumes:
  afintrix-db-data:
    name: afintrix-db-data
  afintrix-storage:
    name: afintrix-storage
  afintrix-client-node-modules:
    name: afintrix-client-node-modules

services:
  afintrix-db:
    image: postgres:16
    container_name: afintrix-db
    networks:
      - afintrix-network
    environment:
      POSTGRES_DB: ${DB_DATABASE:-afintrix}
      POSTGRES_USER: ${DB_USERNAME:-afintrix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-afintrix}
    ports:
      - "5433:5432"
    volumes:
      - afintrix-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-afintrix}"]
      interval: 5s
      timeout: 5s
      retries: 5

  afintrix-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: afintrix-backend
    working_dir: /usr/share/nginx/html
    networks:
      - afintrix-network
    depends_on:
      afintrix-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # :z = SELinux shared label (Fedora/RHEL). Use host composer install; no empty vendor volume.
      - ./api:/usr/share/nginx/html:rw,z
      - afintrix-storage:/usr/share/nginx/html/storage
    env_file:
      - .env.local
    environment:
      APP_NAME: ${APP_NAME:-Afintrix}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: "true"
      APP_DEV_CORS: "true"
      APP_URL: ${LARAVEL_APP_URL:-http://localhost:8000}
      FRONT_URL: ${FRONT_URL:-http://localhost:3000}
      DB_HOST: afintrix-db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-afintrix}
      DB_USERNAME: ${DB_USERNAME:-afintrix}
      DB_PASSWORD: ${DB_PASSWORD:-afintrix}
      DB_CONNECTION: pgsql
      FILESYSTEM_DRIVER: local
      LOCAL_FILESYSTEM_VISIBILITY: public
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-dev@localhost}
      MAIL_FROM_NAME: ${APP_NAME:-Afintrix}
      APP_KEY: ${APP_KEY:-base64:dD8AFEB45nKZ0VWmIPiW495rDYb+ywRJnCCSdycw0pI=}
      JWT_SECRET: ${JWT_SECRET:-38hjE96gYu4ceKSSHNnzgeynMr2m3WkNBN2u7zzpVeiITtxFEloxAjcr7TCKuiiy}
      FRONT_API_SECRET: ${FRONT_API_SECRET:-local-dev-secret}
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

  afintrix-frontend:
    image: node:22-alpine
    container_name: afintrix-frontend
    working_dir: /app
    networks:
      - afintrix-network
    depends_on:
      - afintrix-backend
    ports:
      - "3000:3000"
      - "24678:24678"
    volumes:
      - ./client:/app:rw,z
      - afintrix-client-node-modules:/app/node_modules
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      HOME: /tmp
      NPM_CONFIG_CACHE: /tmp/npm-cache
      NUXT_PUBLIC_APP_ENV: local
      NUXT_PUBLIC_ENV: local
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
      NUXT_PRIVATE_API_BASE: http://afintrix-backend:8000
      NUXT_API_SECRET: ${NUXT_API_SECRET:-local-dev-secret}
    command: >
      sh -c "
      if [ ! -f node_modules/.install-complete ] || [ package.json -nt node_modules/.install-complete ]; then
        npm install && touch node_modules/.install-complete;
      else
        echo 'Dependencies up to date, skipping install';
      fi && npm run docker-dev"
